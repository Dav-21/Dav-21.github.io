<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width">
	<title>To do list</title>
	<link rel="stylesheet" href="./styles/index.css">
	<script type="module" src="script.js"></script>
</head>
<body>

 	<div class="todo" data-js-todo>

		<div class="theme-switch" data-js-todo-theme-switch>
			<div class="theme-switch__circle" data-js-todo-theme-circle></div>
		</div>

		<h1 id="start" class="todo__title">To Do List</h1>
		<form class="todo__form" data-js-todo-new-task-form>
			<div class="todo__field field">
				<label class="field__label" for="new-task">
					New task title
				</label>
				<input data-js-todo-new-task-input id="new-task" class="field__input" type="text" name=""
					placeholder=" " autocomplete="off">
			</div>
			<button class="button" type="submit">Add</button>
		</form>

		<form class="todo__form" data-js-todo-search-task-form>
			<div class="todo__field field">
				<label class="field__label" for="search-task">
					Search Task
				</label>
				<input data-js-todo-search-task-input id="search-task" class="field__input" type="search" name=""
					placeholder=" " autocomplete="off" type="search">
			</div>
		</form>
		<div class="todo__info">
			<div class="todo__total-tasks">Total Tasks: <span data-js-todo-total-tasks>0</span></div>
			<button data-js-todo-delete-all-button class="todo__delete-all-button" type="button">Delete All</button>
		</div>
		<ul class="todo__list" data-js-todo-list>

		</ul>
		<div class="todo__empty-message" data-js-todo-empty-message> </div>

		
	</div>
	 

		<a href="#start" class="scroll-to-top">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
				class="icon icon-tabler icons-tabler-filled icon-tabler-circle-chevrons-up">
				<path stroke="none" d="M0 0h24v24H0z" fill="none" />
				<path
					d="M11.867 2.001c5.495 0 9.96 4.432 10 9.926s-4.359 9.993 -9.852 10.073h-.295c-5.493 -.081 -9.893 -4.579 -9.852 -10.073c.04 -5.494 4.505 -9.926 10 -9.926m.84 9.292a1 1 0 0 0 -1.414 0l-3 3a1 1 0 0 0 0 1.414l.094 .083a1 1 0 0 0 1.32 -.083l2.292 -2.292l2.293 2.292a1 1 0 0 0 1.414 -1.414zm0 -4a1 1 0 0 0 -1.414 0l-3 3a1 1 0 0 0 0 1.414l.094 .083a1 1 0 0 0 1.32 -.083l2.292 -2.292l2.293 2.292a1 1 0 0 0 1.414 -1.414z" />
			</svg>
		</a>

</body>
</html>
